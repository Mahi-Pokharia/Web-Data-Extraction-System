# Server ──────────────────────────────────────────────────────────────────
server.port=8080

# ─── App Name ────────────────────────────────────────────────────────────────
spring.application.name=web-scraper

# ─── Logging ─────────────────────────────────────────────────────────────────
logging.level.com.project.scraper=DEBUG
logging.level.org.springframework.web=INFO

# ─── Static Resources (served from src/main/resources/static automatically) ──
spring.web.resources.static-locations=classpath:/static/
